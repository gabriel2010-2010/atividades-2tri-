<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>formulário ed cadastro</h1>
   <form>
    <label for="formulario de cadastro gabriel">formulário de cadastro gabriel</label><br>
    <input type="text" id="titulo" name="gabriel" placeholder="aviso"><br><br>

    <label for="descricao">Descrição</label><br>
    <textarea id="descricao" name="descricao" rows="5" placeholder="aviso"></textarea><br><br>

    <label for="categoria">Categoria</label><br>
    <select id="categoria" name="categoria">
      <option value="geral">Geral</option>
      <option value="prova">Prova</option>
      <option value="evento">Evento</option>
    </select><br><br>

    <button type="submit">Salvar aviso</button>
  </form>
</body>
</html>
